<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Mwavuli Photography</title>
<link rel="preload" as="style" href="../assets/fonts/fonts.css" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="../assets/fonts/fonts.css"></noscript>
<link rel="stylesheet" href="../assets/vendor/fontawesome/css/all.min.css">
<link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="brand-logo"><i class="fa-solid fa-camera-retro"></i></div>
        <h1>MWAVULI</h1>
        <p>Photography &middot; Admin Portal</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="field">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="email" placeholder="Email address" required autocomplete="username">
        </div>
        <div class="field">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
        </div>
        <button type="submit" id="loginBtn">
          <span class="btn-text">Sign In <i class="fa-solid fa-arrow-right"></i></span>
          <span class="spinner"></span>
        </button>
      </form>

      <p id="message"></p>
    </div>
    <p class="login-foot">&copy; 2026 Mwavuli Photography. All rights reserved.</p>
  </div>

  <script src="auth.js?v=3"></script>
  <script src="login.js?v=3"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => { });
    }
  </script>
</body>
</html>
