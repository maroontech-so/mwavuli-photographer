<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Mwavuli Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="brand-logo"><i class="fa-solid fa-camera-retro"></i></div>
        <h1>MWAVULI</h1>
        <p>Photography &middot; Admin Portal</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="field">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="email" placeholder="Email address" required autocomplete="username">
        </div>
        <div class="field">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
        </div>
        <button type="submit" id="loginBtn">
          <span class="btn-text">Sign In <i class="fa-solid fa-arrow-right"></i></span>
          <span class="spinner"></span>
        </button>
      </form>

      <p id="message"></p>
    </div>
    <p class="login-foot">&copy; 2026 Mwavuli Photography. All rights reserved.</p>
  </div>

  <script src="auth.js?v=3"></script>
  <script src="login.js?v=3"></script>
</body>
</html>
