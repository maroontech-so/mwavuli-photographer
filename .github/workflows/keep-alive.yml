name: Keep Render awake

on:
  schedule:
    # Every 5 minutes (UTC). Keeps the free Render instance from spinning down.
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -fsS --max-time 15 https://your-app.onrender.com/api/health || echo "ping failed"
